<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>战投工作台 · 登录</title>
<style>
:root{--bg:#faf9f7;--bg3:#ffffff;--border2:rgba(0,0,0,.14);--text:#1a1a18;--text3:#8e8d86;--r:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Georgia','Noto Serif SC',serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{width:340px;padding:44px 40px;background:var(--bg3);
  border:.5px solid var(--border2);border-radius:16px}
.label{font-family:'Courier New',monospace;font-size:10px;letter-spacing:.16em;
  color:var(--text3);text-transform:uppercase;margin-bottom:20px}
h1{font-size:24px;font-weight:normal;margin-bottom:32px;letter-spacing:-.4px}
input[type=password]{
  width:100%;padding:11px 14px;border:.5px solid var(--border2);
  border-radius:var(--r);background:var(--bg);font-family:'Georgia',serif;
  font-size:14px;color:var(--text);outline:none;transition:border-color .15s;
  margin-bottom:14px}
input[type=password]:focus{border-color:var(--text)}
button{width:100%;padding:12px;background:var(--text);color:#fff;border:none;
  border-radius:var(--r);font-family:'Georgia',serif;font-size:14px;cursor:pointer;
  transition:opacity .15s}
button:hover{opacity:.85}
.err{font-family:'Courier New',monospace;font-size:11px;color:#9b2c2c;
  margin-bottom:12px;display:none}
.err.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="label">战投 · 工作台</div>
  <h1>进入系统</h1>
  <div class="err {{ERR_CLASS}}">{{ERROR}}</div>
  <form method="POST">
    <input type="password" name="password" placeholder="访问密码" autofocus>
    <button type="submit">进入 →</button>
  </form>
</div>
</body>
</html>
