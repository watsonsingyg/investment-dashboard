{% extends "_base.html" %}
{% block title %}Pipeline · 登录{% endblock %}
{% block extra_css %}{% endblock %}

{% block content %}
<div class="auth-page">
<div class="auth-card">
  <div class="auth-label">Pipeline · Investment Management</div>
  <h1>登录</h1>
  <div class="auth-error" id="err"></div>
  <form id="loginForm">
    <input type="email" id="email" placeholder="邮箱" autofocus autocomplete="email">
    <input type="password" id="password" placeholder="密码" autocomplete="current-password">
    <button type="submit" class="btn btn-primary" id="submitBtn">进入工作台</button>
  </form>
  <div class="auth-link">
    没有账号？<a href="/register">注册</a>
    <span style="margin:0 10px;color:var(--text3)">·</span>
    <a href="#" onclick="showErr('请联系管理员重置密码');return false">忘记密码？</a>
  </div>
</div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
localStorage.removeItem('pipeline_access_token');
localStorage.removeItem('pipeline_refresh_token');
document.cookie = 'pipeline_token=; Max-Age=0; Path=/; SameSite=Lax';

const form = document.getElementById('loginForm');
const errEl = document.getElementById('err');
const btn = document.getElementById('submitBtn');

function showErr(msg) {
  errEl.textContent = msg;
  errEl.classList.add('show');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errEl.classList.remove('show');
  btn.disabled = true;
  btn.textContent = '登录中...';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!email || !password) {
    showErr('请输入邮箱和密码');
    btn.disabled = false;
    btn.textContent = '进入工作台';
    return;
  }

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password}),
    });
    const data = await r.json();
    if (!r.ok) {
      showErr(data.error || '登录失败');
      btn.disabled = false;
      btn.textContent = '进入工作台';
      return;
    }

    localStorage.setItem('pipeline_access_token', data.access_token);
    localStorage.setItem('pipeline_refresh_token', data.refresh_token);

    try {
      const cr = await fetch('/api/settings/ai-config', {
        headers: {'Authorization': 'Bearer ' + data.access_token}
      });
      const cd = await cr.json();
      window.location.href = cd.is_configured ? '/' : '/settings';
    } catch(e) {
      window.location.href = '/';
    }
  } catch (err) {
    showErr('网络错误，请重试');
    btn.disabled = false;
    btn.textContent = '进入工作台';
  }
});
</script>
{% endblock %}
