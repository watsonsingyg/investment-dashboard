{% extends "_base.html" %}
{% block title %}404 · Pipeline{% endblock %}
{% block extra_css %}
<style>
.error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at 20% 50%, rgba(217,119,6,0.04) 0%, transparent 50%), var(--bg); padding: 40px 24px; }
.error-card { text-align: center; max-width: 480px; }
.error-code { font-size: 96px; font-weight: 800; letter-spacing: -0.03em; color: var(--amber); line-height: 1; margin-bottom: 8px; }
.error-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
.error-desc { font-size: 14px; color: var(--text3); line-height: 1.7; margin-bottom: 28px; }
.error-actions { display: flex; gap: 10px; justify-content: center; }
</style>
{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-card">
    <div class="error-code">404</div>
    <div class="error-title">页面不存在</div>
    <div class="error-desc">你访问的页面可能已被移除、链接错误或暂时不可用。</div>
    <div class="error-actions">
      <a href="/" class="btn btn-primary">返回工作台</a>
      <a href="/dashboard" class="btn btn-secondary">前往看板</a>
    </div>
  </div>
</div>
{% endblock %}
